# ============================================================
# POWERSPORTS WORKER VPS — Docker Compose
# ============================================================
# Deploy to: Hetzner CX21 ($6/mo) — 2 vCPU, 4GB RAM, 40GB SSD
#
# Setup commands:
#   apt update && apt install -y docker.io docker-compose-v2
#   git clone your-repo && cd workers
#   cp .env.example .env && nano .env
#   docker compose up -d
#
# All services auto-restart on crash and on server reboot.
# ============================================================

version: '3.9'

services:

  # ── REDIS ────────────────────────────────────────────────
  # Used for: job queues (BullMQ), caching, session storage
  redis:
    image: redis:7.2-alpine
    container_name: ps_redis
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"   # localhost only — never expose publicly
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── TYPESENSE ─────────────────────────────────────────────
  # Open-source search — replaces Algolia ($35-400/mo saved)
  # Handles: product search, fitment filtering, faceted browsing
  typesense:
    image: typesense/typesense:0.25.2
    container_name: ps_typesense
    restart: always
    command: >
      --data-dir /data
      --api-key=${TYPESENSE_API_KEY}
      --listen-port=8108
      --enable-cors
    volumes:
      - typesense_data:/data
    ports:
      - "127.0.0.1:8108:8108"   # localhost only — Next.js proxies search requests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8108/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── WORKER: Vendor Sync ───────────────────────────────────
  # Pulls product feeds from WPS, DS, etc.
  # Runs: every 6 hours (configurable per vendor)
  worker-vendor-sync:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_vendor_sync
    restart: always
    environment:
      - WORKER_TYPE=vendor-sync
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - TYPESENSE_HOST=typesense
      - TYPESENSE_PORT=8108
      - TYPESENSE_API_KEY=${TYPESENSE_API_KEY}
      - WPS_API_KEY=${WPS_API_KEY}
      - WPS_ACCOUNT_NUMBER=${WPS_ACCOUNT_NUMBER}
      - DS_FTP_HOST=${DS_FTP_HOST}
      - DS_FTP_USER=${DS_FTP_USER}
      - DS_FTP_PASSWORD=${DS_FTP_PASSWORD}
      - DS_ACCOUNT_NUMBER=${DS_ACCOUNT_NUMBER}
    depends_on:
      redis:
        condition: service_healthy
      typesense:
        condition: service_healthy
    volumes:
      - worker_logs:/app/logs

  # ── WORKER: Order Processor ───────────────────────────────
  # Listens for new paid orders, splits by vendor, submits POs
  # Real-time — always running
  worker-order-processor:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_orders
    restart: always
    environment:
      - WORKER_TYPE=order-processor
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - WPS_API_KEY=${WPS_API_KEY}
      - WPS_ACCOUNT_NUMBER=${WPS_ACCOUNT_NUMBER}
      - DS_ACCOUNT_NUMBER=${DS_ACCOUNT_NUMBER}
    depends_on:
      redis:
        condition: service_healthy

  # ── WORKER: Tracking Sync ─────────────────────────────────
  # Polls vendor APIs for tracking updates every 30 min
  worker-tracking:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_tracking
    restart: always
    environment:
      - WORKER_TYPE=tracking-sync
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - WPS_API_KEY=${WPS_API_KEY}
      - WPS_ACCOUNT_NUMBER=${WPS_ACCOUNT_NUMBER}
    depends_on:
      redis:
        condition: service_healthy

  # ── WORKER: Abandoned Cart ────────────────────────────────
  # Detects and emails abandoned carts (1hr, 24hr, 72hr sequence)
  worker-abandoned-cart:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_abandoned_cart
    restart: always
    environment:
      - WORKER_TYPE=abandoned-cart
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - SITE_URL=${SITE_URL}
    depends_on:
      redis:
        condition: service_healthy

  # ── WORKER: MAP Monitor ───────────────────────────────────
  # Daily MAP compliance checks, alerts on violations
  worker-map-monitor:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_map
    restart: always
    environment:
      - WORKER_TYPE=map-monitor
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - AUTO_FIX_MAP_VIOLATIONS=${AUTO_FIX_MAP_VIOLATIONS:-true}
    depends_on:
      redis:
        condition: service_healthy

  # ── WORKER: Competitor Scraper ────────────────────────────
  # Daily price check on RevZilla + JP Cycles for top SKUs
  worker-competitor:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_competitor
    restart: always
    environment:
      - WORKER_TYPE=competitor-scraper
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - SCRAPE_DELAY_MS=2000        # be polite — 2s between requests
      - MAX_SKUS_PER_RUN=500
    depends_on:
      redis:
        condition: service_healthy
    # Competitor scraper needs more memory for Playwright/Puppeteer
    deploy:
      resources:
        limits:
          memory: 1G

  # ── WORKER: Email Sender ──────────────────────────────────
  # Processes email_queue table, sends via Resend
  worker-email:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_email
    restart: always
    environment:
      - WORKER_TYPE=email-sender
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME}
      - SITE_URL=${SITE_URL}
    depends_on:
      redis:
        condition: service_healthy

  # ── WORKER: Points Expiration ─────────────────────────────
  # Monthly job: expire points for inactive accounts
  worker-points:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ps_worker_points
    restart: always
    environment:
      - WORKER_TYPE=points-expiration
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DATABASE_URL=${DATABASE_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

  # ── BULL BOARD ────────────────────────────────────────────
  # Visual job queue dashboard (admin only, password protected)
  # Access at: http://your-vps-ip:3001
  bull-board:
    build:
      context: .
      dockerfile: Dockerfile.bullboard
    container_name: ps_bull_board
    restart: always
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - BOARD_USERNAME=${BOARD_USERNAME:-admin}
      - BOARD_PASSWORD=${BOARD_PASSWORD}
    ports:
      - "127.0.0.1:3001:3001"  # tunnel via SSH: ssh -L 3001:localhost:3001 user@vps
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
    driver: local
  typesense_data:
    driver: local
  worker_logs:
    driver: local

networks:
  default:
    name: powersports_network
